global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: blackbox-exporter
    static_configs:
      - targets:
          - blackbox-exporter:9115

  # Probe each service's /health endpoint via blackbox exporter.
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: [http://api-gateway:3000/health]
        labels:
          service: api-gateway
      - targets: [http://auth-service:3001/health]
        labels:
          service: auth-service
      - targets: [http://product-service:3002/health]
        labels:
          service: product-service
      - targets: [http://order-service:3003/health]
        labels:
          service: order-service
      - targets: [http://payment-service:3004/health]
        labels:
          service: payment-service
      - targets: [http://notification-service:3005/health]
        labels:
          service: notification-service
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

